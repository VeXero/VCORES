name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -f VCORE/Dockerfile -t vcore-backend ./VCORE

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag Docker image for GHCR
        if: github.event_name == 'push'
        run: docker tag vcore-backend ghcr.io/${{ github.repository_owner }}/vcore-backend:latest

      - name: Push Docker image to GHCR
        if: github.event_name == 'push'
        run: docker push ghcr.io/${{ github.repository_owner }}/vcore-backend:latest

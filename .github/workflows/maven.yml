name: Java CI/CD with Maven

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        working-directory: VCORE
        run: mvn -B clean package

      - name: Run tests with JaCoCo coverage
        working-directory: VCORE
        run: mvn -B test jacoco:report

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: VCORE/target/surefire-reports
          if-no-files-found: warn

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: VCORE/target/site/jacoco
          if-no-files-found: warn

  sonar-analysis:
    if: github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        working-directory: VCORE
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify sonar:sonar -Dsonar.token=${SONAR_TOKEN}

  docker-build-push:
    if: github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image-meta.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: image-meta
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/vcores:${{ github.sha }}
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build -t "${{ steps.image-meta.outputs.image }}" ./VCORE
          docker push "${{ steps.image-meta.outputs.image }}"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker-build-push
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy container
        run: |
          docker pull "${{ needs.docker-build-push.outputs.image }}"
          docker rm -f vcores || true
          docker run -d --name vcores -p 8080:8080 "${{ needs.docker-build-push.outputs.image }}"

      - name: Health check
        run: |
          for i in {1..20}; do
            if curl --fail --silent http://localhost:8080/actuator/health; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Waiting for application to become healthy..."
            sleep 5
          done
          echo "Health check failed"
          exit 1
